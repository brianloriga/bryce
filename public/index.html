<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Measurement Master</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
      <div class="home-container">
        <button class="parent-gear" onclick="showParentMenu()" title="Parent Settings">⚙️</button>
        <div class="logo-area">
          <div class="logo-icon">📏</div>
          <h1 class="game-title">Measurement<br>Master</h1>
          <p class="subtitle">Become a measurement superhero!</p>
        </div>
        <div class="menu-cards">
          <button class="menu-card" onclick="startGame('numberline')" style="--accent: #FF6B6B;">
            <div class="card-icon">📐</div>
            <div class="card-title">Number Lines</div>
            <div class="card-desc">Fill in the missing measurements</div>
            <div class="card-stars" id="stars-numberline"></div>
          </button>
          <button class="menu-card" onclick="startGame('tools')" style="--accent: #4ECDC4;">
            <div class="card-icon">🔧</div>
            <div class="card-title">Right Tool</div>
            <div class="card-desc">Pick the best tool to measure</div>
            <div class="card-stars" id="stars-tools"></div>
          </button>
          <button class="menu-card" onclick="startGame('ruler')" style="--accent: #45B7D1;">
            <div class="card-icon">📏</div>
            <div class="card-title">Read the Ruler</div>
            <div class="card-desc">How long is it?</div>
            <div class="card-stars" id="stars-ruler"></div>
          </button>
          <button class="menu-card" onclick="startGame('convert')" style="--accent: #F7DC6F;">
            <div class="card-icon">🔄</div>
            <div class="card-title">Unit Converter</div>
            <div class="card-desc">Convert between units</div>
            <div class="card-stars" id="stars-convert"></div>
          </button>
        </div>
        <div class="boss-card-wrapper" id="boss-card-wrapper">
          <button class="boss-card locked" id="boss-card" onclick="startBoss()" disabled>
            <div class="boss-card-glow"></div>
            <div class="boss-card-inner">
              <div class="boss-lock-icon" id="boss-lock-icon">🔒</div>
              <div class="boss-card-title" id="boss-card-title">BOSS BATTLE</div>
              <div class="boss-card-desc" id="boss-card-desc">Get ⭐3+ in all 4 activities to unlock!</div>
              <div class="boss-card-checklist" id="boss-checklist"></div>
            </div>
          </button>
        </div>
        <div class="total-score-display">
          <span class="trophy">🏆</span> Total Stars: <span id="total-stars">0</span>
        </div>
      </div>
    </div>

    <!-- Boss Battle Screen -->
    <div id="boss-screen" class="screen">
      <div class="boss-arena">
        <div class="boss-hud">
          <button class="back-btn" onclick="goHome()">← Flee</button>
          <div class="boss-hearts" id="boss-hearts"></div>
          <div class="boss-combo" id="boss-combo"></div>
        </div>
        <div class="boss-monster-area" id="boss-monster-area">
          <div class="boss-monster-name">Measurement Dragon</div>
          <div class="boss-hp-bar-container">
            <div class="boss-hp-bar" id="boss-hp-bar"></div>
            <span class="boss-hp-text" id="boss-hp-text">100 / 100</span>
          </div>
          <div class="boss-monster" id="boss-monster">
            <div class="boss-monster-sprite">🐉</div>
          </div>
          <div class="boss-damage-float" id="boss-damage-float"></div>
        </div>
        <div class="boss-question-area" id="boss-question-area">
          <div class="boss-question-text" id="boss-q-text"></div>
          <div class="boss-options" id="boss-options"></div>
        </div>
      </div>
    </div>

    <!-- Boss Victory Screen -->
    <div id="boss-victory-screen" class="screen">
      <div class="boss-victory-container">
        <div class="boss-victory-emoji">⚔️</div>
        <h2 class="boss-victory-title" id="boss-victory-title">VICTORY!</h2>
        <p class="boss-victory-sub" id="boss-victory-sub">You defeated the Measurement Dragon!</p>
        <div class="boss-victory-stats" id="boss-victory-stats"></div>
        <div class="results-buttons">
          <button class="retry-btn" onclick="startBoss()">Fight Again ⚔️</button>
          <button class="home-btn-result" onclick="goHome()">Home 🏠</button>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="game-header-info">
          <span class="game-label" id="game-label">Number Lines</span>
          <span class="game-progress" id="game-progress">1 / 5</span>
        </div>
        <div class="game-score">
          ⭐ <span id="current-score">0</span>
        </div>
      </div>
      <div class="game-body" id="game-body">
        <!-- Dynamic content goes here -->
      </div>
      <div class="game-footer">
        <button class="check-btn" id="check-btn" onclick="checkAnswer()">Check Answer ✓</button>
        <button class="next-btn hidden" id="next-btn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results-container">
        <div class="results-emoji" id="results-emoji">🎉</div>
        <h2 class="results-title" id="results-title">Great Job!</h2>
        <div class="results-stars" id="results-stars"></div>
        <p class="results-score" id="results-score">You got 4 out of 5 correct!</p>
        <div class="results-buttons">
          <button class="retry-btn" onclick="retryGame()">Try Again 🔄</button>
          <button class="home-btn-result" onclick="goHome()">Home 🏠</button>
        </div>
      </div>
    </div>

    <!-- Feedback overlay -->
    <div class="feedback-overlay hidden" id="feedback-overlay">
      <div class="feedback-content" id="feedback-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
